<script type="module">
import * as THREE from 'https://unpkg.com/three/build/three.module.js';

const params = new URLSearchParams(window.location.search);

const VALID_VERSIONS = [
  "1.14","1.16","1.17","1.18","1.19",
  "1.20","1.21","1.21.50","1.21.70",
  "1.21.90","1.21.111","1.21.130","26.1"
];

const DEFAULT_VERSION = "26.1";

const versionParam = params.get("v");

const version = VALID_VERSIONS.includes(versionParam)
  ? versionParam
  : DEFAULT_VERSION;

const velocity = isNaN(Number(params.get("r")))
  ? 0.0004
  : Number(params.get("r"));

console.log("Versión cargada:", version);

// Scene
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;

document.body.appendChild(renderer.domElement);

// Responsive
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Loader
const loader = new THREE.TextureLoader();

function loadMaterial(path) {
  const texture = loader.load(path);
  texture.encoding = THREE.sRGBEncoding;

  return new THREE.MeshBasicMaterial({
    map: texture,
    side: THREE.BackSide // 🔥 ver desde dentro
  });
}

// Crear cubo MANUAL (compatibilidad total)
function createPanorama() {

  const size = 3;
  const half = size / 2;

  const geometry = new THREE.PlaneGeometry(size, size);

  const faces = [];

  // FRONT
  const front = new THREE.Mesh(geometry, loadMaterial(`./${version}/panorama_0.png`));
  front.position.z = -half;
  faces.push(front);

  // BACK
  const back = new THREE.Mesh(geometry, loadMaterial(`./${version}/panorama_2.png`));
  back.rotation.y = Math.PI;
  back.position.z = half;
  faces.push(back);

  // LEFT
  const left = new THREE.Mesh(geometry, loadMaterial(`./${version}/panorama_1.png`));
  left.rotation.y = Math.PI / 2;
  left.position.x = -half;
  faces.push(left);

  // RIGHT
  const right = new THREE.Mesh(geometry, loadMaterial(`./${version}/panorama_3.png`));
  right.rotation.y = -Math.PI / 2;
  right.position.x = half;
  faces.push(right);

  // TOP
  const top = new THREE.Mesh(geometry, loadMaterial(`./${version}/panorama_4.png`));
  top.rotation.x = -Math.PI / 2;
  top.position.y = half;
  faces.push(top);

  // BOTTOM
  const bottom = new THREE.Mesh(geometry, loadMaterial(`./${version}/panorama_5.png`));
  bottom.rotation.x = Math.PI / 2;
  bottom.position.y = -half;
  faces.push(bottom);

  faces.forEach(f => scene.add(f));
}

createPanorama();

// Cámara
camera.position.set(0, 0, 0.1);

// Animación
function animate() {
  requestAnimationFrame(animate);
  camera.rotation.y -= velocity;
  renderer.render(scene, camera);
}

animate();
</script>
